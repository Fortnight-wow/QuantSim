    (() => {
      const app = document.getElementById('app');
      const dpr = Math.max(1, window.devicePixelRatio || 1);
      const fmt = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' });
      const now = () => new Date().toLocaleTimeString();
      const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
      const randn = () => {
        let u = 0, v = 0;
        while (u === 0) u = Math.random();
        while (v === 0) v = Math.random();
        return Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v);
      };
      const sma = (arr, period, key='close') => {
        if (arr.length < period) return null;
        let sum = 0;
        for (let i = arr.length - period; i < arr.length; i++) sum += arr[i][key];
        return sum / period;
      };
      const ema = (values, period) => {
        if (!values.length) return [];
        const k = 2 / (period + 1);
        const out = [values[0]];
        for (let i = 1; i < values.length; i++) out.push(values[i] * k + out[i - 1] * (1 - k));
        return out;
      };
      const rsi = (values, period = 14) => {
        if (values.length <= period) return 50;
        let gains = 0, losses = 0;
        for (let i = values.length - period; i < values.length; i++) {
          const diff = values[i] - values[i - 1];
          if (diff > 0) gains += diff; else losses -= diff;
        }
        if (losses === 0) return 100;
        const rs = (gains / period) / (losses / period);
        return 100 - (100 / (1 + rs));
      };
      const sharpe = (equity) => {
        if (equity.length < 12) return 0;
        const rets = [];
        for (let i = 1; i < equity.length; i++) rets.push((equity[i] - equity[i - 1]) / Math.max(1e-9, equity[i - 1]));
        const avg = rets.reduce((a,b)=>a+b, 0) / rets.length;
        const variance = rets.reduce((a,b)=>a + Math.pow(b - avg, 2), 0) / rets.length;
        const sd = Math.sqrt(variance) || 1e-9;
        return (avg / sd) * Math.sqrt(252);
      };

      const state = {

        holdings: 0,
        isRunning: false,

if (market.rsi < 30) {
  return { action: 'BUY_ALL' };

if (market.rsi > 70) {

return { action: 'HOLD' };`,

      const stateRefs = {

      const html = `

              <div class="flex items-center gap-1"><span class="w-3 h-1 bg-yellow-400 inline-block"></span> SMA(15)</div>

            </div>
          </div>

          <div class="relative h-56 rounded-2xl border border-zinc-800 bg-zinc-950 overflow-hidden panel" id="portfolioWrap">
            <div class="absolute top-3 left-4 z-10 pointer-events-none">
              <div class="text-sm font-semibold text-zinc-400">Net Worth Over Time</div>
            </div>

          </div>
        </main>

        <aside class="w-72 shrink-0 border-l border-zinc-800 glass flex flex-col overflow-hidden">
          <div class="px-4 py-4 border-b border-zinc-800">
            <div class="text-sm font-bold uppercase tracking-[0.2em] text-white">Execution Log</div>
          </div>
          <div id="tradeLog" class="flex-1 overflow-y-auto scrollbar p-2 space-y-2"></div>

            Bot ranking is based on profit, Sharpe ratio, and drawdown.

      `;

      app.innerHTML = html;

      const el = (id) => document.getElementById(id);
      const mainChart = el('mainChart');
      const portfolioChart = el('portfolioChart');
      const profitChart = el('profitChart');
      const chartWrap = el('chartWrap');
      const portfolioWrap = el('portfolioWrap');

      const ctxMain = mainChart.getContext('2d');
      const ctxPortfolio = portfolioChart.getContext('2d');
      const ctxProfit = profitChart.getContext('2d');

      const botNames = ['sma', 'pattern', 'alpha3', 'custom'];
      const botLabel = { sma: 'SMA', pattern: 'Pattern', alpha3: 'Alpha3', custom: 'Custom' };

      function setupCanvas(canvas, wrap) {
        const rect = wrap.getBoundingClientRect();
        canvas.width = Math.max(1, Math.floor(rect.width * dpr));
        canvas.height = Math.max(1, Math.floor(rect.height * dpr));
        canvas.style.width = rect.width + 'px';
        canvas.style.height = rect.height + 'px';
        const ctx = canvas.getContext('2d');
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.imageSmoothingEnabled = true;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
      }

      function resizeCanvases() {
        setupCanvas(mainChart, chartWrap);
        setupCanvas(portfolioChart, portfolioWrap);
        setupCanvas(profitChart, el('profitChart').parentElement);
        renderAll();
      }

      function trade(type, price, qty, source = 'MANUAL', bot = null) {
        if (bot) {
          const entry = state.botStats[bot];
          const value = state.cash + state.holdings * price;
          entry.equity.push(value);
          entry.profit = value - 10000;
          entry.sharpe = sharpe(entry.equity);
        }
        state.trades.unshift({ id: Date.now() + Math.random(), type, price, qty, time: now(), source });
        state.trades = state.trades.slice(0, 60);
      }

      function applyManualTrade(type) {
        const price = state.history[state.history.length - 1].close;
        if (type === 'BUY' && state.cash >= price) {
          const qty = 1;
          state.cash -= price * qty;
          state.holdings += qty;
          trade('BUY', price, qty, 'MANUAL');
        } else if (type === 'SELL' && state.holdings > 0) {
          const qty = 1;
          state.cash += price * qty;
          state.holdings -= qty;
          trade('SELL', price, qty, 'MANUAL');
        } else if (type === 'SELL_ALL' && state.holdings > 0) {
          const qty = state.holdings;
          state.cash += price * qty;
          state.holdings = 0;
          trade('SELL_ALL', price, qty, 'MANUAL');
        }
        syncPortfolio(price);
      }

      function syncPortfolio(price) {
        const netWorth = state.cash + state.holdings * price;
        state.portfolio[state.portfolio.length - 1] = netWorth;
        state.netWorthTrail[state.netWorthTrail.length - 1] = netWorth;
        state.maxNetWorth = Math.max(state.maxNetWorth, netWorth);
        state.drawdownPeak = Math.max(state.drawdownPeak, netWorth);
      }

      function priceStep() {
        const last = state.history[state.history.length - 1];
        const drift = state.regime.drift;
        const vol = state.regime.vol;
        const momentum = (state.history.length > 2 ? (state.history[state.history.length - 1].close - state.history[state.history.length - 2].close) / Math.max(1e-9, state.history[state.history.length - 2].close) : 0);
        const changePct = drift + vol * (0.55 * randn() + 0.2 * momentum);
        const newPrice = Math.max(0.01, last.close * (1 + changePct));
        const currentNetWorth = state.cash + state.holdings * newPrice;

        state.peRatio = Math.max(5, state.peRatio + (20 - state.peRatio) * 0.05 + randn() * 0.25);
        state.maxNetWorth = Math.max(state.maxNetWorth, currentNetWorth);
        state.drawdownPeak = Math.max(state.drawdownPeak, currentNetWorth);

        if (state.tick % 5 === 0 && state.tick !== 0) {
          state.history.push({ open: newPrice, high: newPrice, low: newPrice, close: newPrice });
          state.portfolio.push(currentNetWorth);
          state.netWorthTrail.push(currentNetWorth);
        } else {
          const c = { ...state.history[state.history.length - 1] };
          c.close = newPrice;
          c.high = Math.max(c.high, newPrice);
          c.low = Math.min(c.low, newPrice);
          state.history[state.history.length - 1] = c;
          state.portfolio[state.portfolio.length - 1] = currentNetWorth;
          state.netWorthTrail[state.netWorthTrail.length - 1] = currentNetWorth;
        }

        if (state.history.length > 240) state.history.shift();
        if (state.portfolio.length > 120) state.portfolio.shift();
        if (state.netWorthTrail.length > 120) state.netWorthTrail.shift();

        state.tick += 1;
        if (state.tick > 0 && state.tick % 300 === 0) {
          const r = Math.random();
          if (r < 0.33) state.regime = { name: 'Bull Market', drift: 0.001, vol: 0.008 };
          else if (r < 0.66) state.regime = { name: 'Bear Market', drift: -0.001, vol: 0.012 };
          else state.regime = { name: 'Normal', drift: 0.00012, vol: 0.005 };
        }

        runBots(newPrice);
        renderAll();
      }

      function runBots(price) {
        const closes = state.history.map(c => c.close);
        const current = state.history[state.history.length - 1];
        const currentValue = state.cash + state.holdings * price;
        const rsi14 = rsi(closes, 14);
        const ema20 = ema(closes, 20);
        const ema50 = ema(closes, 50);
        const ema12 = ema(closes, 12);
        const ema26 = ema(closes, 26);
        const macdLine = ema12.map((v, i) => v - (ema26[i] ?? ema26[ema26.length - 1] ?? v));
        const macdSignal = ema(macdLine, 9);
        const macdHist = macdLine.map((v, i) => v - (macdSignal[i] ?? macdSignal[macdSignal.length - 1] ?? v));
        const currEMA20 = ema20[ema20.length - 1] ?? price;
        const currEMA50 = ema50[ema50.length - 1] ?? price;
        const currMACDHist = macdHist[macdHist.length - 1] ?? 0;
        const prevMACDHist = macdHist[macdHist.length - 2] ?? currMACDHist;
        const sma100 = sma(state.history, 100) ?? price;

        const shortSMA = sma(state.history, 5);
        const longSMA = sma(state.history, 15);
        const prevShortSMA = state.history.length >= 6 ? sma(state.history.slice(0, -1), 5) : null;
        const prevLongSMA = state.history.length >= 16 ? sma(state.history.slice(0, -1), 15) : null;

        if (state.autoTrade && shortSMA && longSMA && prevShortSMA && prevLongSMA) {
          const up = shortSMA > longSMA && prevShortSMA <= prevLongSMA;
          const down = shortSMA < longSMA && prevShortSMA >= prevLongSMA;
          if (up && state.cash >= price) {
            const qty = Math.floor(state.cash / price);
            if (qty > 0) {
              state.cash -= qty * price;
              state.holdings += qty;
              trade('BOT_BUY', price, qty, 'SMA', 'sma');
            }
          } else if (down && state.holdings > 0) {
            const qty = state.holdings;
            state.cash += qty * price;
            state.holdings = 0;
            trade('BOT_SELL', price, qty, 'SMA', 'sma');
          }
        }

        if (state.patternBot && state.tick % 5 === 0 && state.history.length >= 3) {
          const curr = state.history[state.history.length - 2];
          const prev = state.history[state.history.length - 3];
          if (curr && prev) {
            const body = Math.abs(curr.close - curr.open);
            const lowerWick = Math.min(curr.open, curr.close) - curr.low;
            const upperWick = curr.high - Math.max(curr.open, curr.close);
            const bullishEngulfing = prev.close < prev.open && curr.close > curr.open && curr.close >= prev.open && curr.open <= prev.close;
            const bearishEngulfing = prev.close > prev.open && curr.close < curr.open && curr.close <= prev.open && curr.open >= prev.close;
            const bullishPinbar = lowerWick > body * 2 && upperWick <= body;
            const bearishPinbar = upperWick > body * 2 && lowerWick <= body;
            const bullish = bullishEngulfing || bullishPinbar;
            const bearish = bearishEngulfing || bearishPinbar;
            if (bullish && price > sma100 && state.cash >= price) {
              const qty = Math.floor(state.cash / price);
              if (qty > 0) {
                state.cash -= qty * price;
                state.holdings += qty;
                trade('PATTERN_BUY', price, qty, 'PATTERN', 'pattern');
              }
            } else if (bearish && price < sma100 && state.holdings > 0) {
              const qty = state.holdings;
              state.cash += qty * price;
              state.holdings = 0;
              trade('PATTERN_SELL', price, qty, 'PATTERN', 'pattern');
            }
          }
        }

        if (state.alpha3Bot && state.tick % 5 === 0) {
          const trendUp = price > currEMA50 && currEMA20 > currEMA50;
          const macdImpulse = currMACDHist > 0 && currMACDHist > prevMACDHist;
          const rsiZone = rsi14 >= 52 && rsi14 <= 72;
          const buySignal = trendUp && macdImpulse && rsiZone;
          const exitSignal = price < currEMA20 || currMACDHist < 0;
          if (buySignal && state.cash >= price) {
            const qty = Math.floor(state.cash / price);
            if (qty > 0) {
              state.cash -= qty * price;
              state.holdings += qty;
              trade('ALPHA3_BUY', price, qty, 'ALPHA3', 'alpha3');
            }
          } else if (exitSignal && state.holdings > 0) {
            const qty = state.holdings;
            state.cash += qty * price;
            state.holdings = 0;
            trade('ALPHA3_SELL', price, qty, 'ALPHA3', 'alpha3');
          }
        }

        if (state.customBotEnabled) {
          const market = { price, rsi: rsi14, sma100, ema20: currEMA20, ema50: currEMA50, regime: state.regime.name, vol: state.regime.vol };
          const portfolio = { cash: state.cash, holdings: state.holdings, netWorth: currentValue };
          const helpers = {
            buyAll: () => state.cash >= price ? { action: 'BUY_ALL' } : { action: 'HOLD' },
            sellAll: () => state.holdings > 0 ? { action: 'SELL_ALL' } : { action: 'HOLD' },
            buy1: () => ({ action: 'BUY_1' }),
            sell1: () => ({ action: 'SELL_1' }),
            hold: () => ({ action: 'HOLD' })
          };
          let decision = { action: 'HOLD' };
          try {
            const code = state.customBotCode.trim();
            if (state.customBotLanguage === 'JavaScript' || state.customBotLanguage === 'TypeScript') {
              const fn = new Function('market', 'portfolio', 'helpers', 'fmt', `"use strict";\n${code}\n`);
              const out = fn(market, portfolio, helpers, fmt);
              if (out && typeof out === 'object') decision = out;
            } else if (state.customBotLanguage === 'JSON Rules') {
              const rules = JSON.parse(code || '{}');
              if (Array.isArray(rules.rules)) {
                for (const rule of rules.rules) {
                  const cond = String(rule.when || '');
                  const act = String(rule.then || 'HOLD');
                  const ok = Function('market', 'portfolio', `return (${cond});`)(market, portfolio);
                  if (ok) { decision = { action: act }; break; }
                }
              }
            } else {
              const lower = code.toLowerCase();
              if (lower.includes('rsi') && market.rsi < 30) decision = { action: 'BUY_ALL' };
              else if (lower.includes('rsi') && market.rsi > 70) decision = { action: 'SELL_ALL' };
              else decision = { action: 'HOLD' };
            }
          } catch (e) {
            decision = { action: 'HOLD', error: e.message };
          }

          if (decision.action === 'BUY_ALL' && state.cash >= price) {
            const qty = Math.floor(state.cash / price);
            if (qty > 0) {
              state.cash -= qty * price;
              state.holdings += qty;
              trade('CUSTOM_BUY', price, qty, 'CUSTOM', 'custom');
            }
          } else if (decision.action === 'SELL_ALL' && state.holdings > 0) {
            const qty = state.holdings;
            state.cash += qty * price;
            state.holdings = 0;
            trade('CUSTOM_SELL', price, qty, 'CUSTOM', 'custom');
          } else if (decision.action === 'BUY_1' && state.cash >= price) {
            state.cash -= price;
            state.holdings += 1;
            trade('CUSTOM_BUY', price, 1, 'CUSTOM', 'custom');
          } else if (decision.action === 'SELL_1' && state.holdings > 0) {
            state.cash += price;
            state.holdings -= 1;
            trade('CUSTOM_SELL', price, 1, 'CUSTOM', 'custom');
          }

          state.customBotProfit = (state.cash + state.holdings * price) - 10000;
          const currNet = state.cash + state.holdings * price;
          state.botStats.custom.equity.push(currNet);
          state.botStats.custom.profit = currNet - 10000;
          state.botStats.custom.sharpe = sharpe(state.botStats.custom.equity);
        }

        state.portfolio[state.portfolio.length - 1] = state.cash + state.holdings * price;
        state.botStats.sma.profit = state.botStats.sma.equity[state.botStats.sma.equity.length - 1] - 10000;
        state.botStats.pattern.profit = state.botStats.pattern.equity[state.botStats.pattern.equity.length - 1] - 10000;
        state.botStats.alpha3.profit = state.botStats.alpha3.equity[state.botStats.alpha3.equity.length - 1] - 10000;
      }

        state.botStats.pattern.profit = state.botStats.pattern.equity[state.botStats.pattern.equity.length - 1] - 10000;
        state.botStats.alpha3.profit = state.botStats.alpha3.equity[state.botStats.alpha3.equity.length - 1] - 10000;
        state.botStats.sma.sharpe = sharpe(state.botStats.sma.equity);

      function drawMainChart() {
        const rect = chartWrap.getBoundingClientRect();
        const width = rect.width;
        const height = rect.height;
        ctxMain.clearRect(0, 0, width, height);
        if (!state.history.length) return;
        ctxMain.fillStyle = '#09090b';
        ctxMain.fillRect(0, 0, width, height);

        ctxMain.strokeStyle = '#1f1f23';
        ctxMain.lineWidth = 1;
        for (let i = 1; i < 10; i++) {
          const y = height * (i / 10);
          ctxMain.beginPath();
          ctxMain.moveTo(0, y);
          ctxMain.lineTo(width, y);
          ctxMain.stroke();
        }

        const visible = 90;
        const start = Math.max(0, state.history.length - visible);
        const data = state.history.slice(start);
        const minP = Math.min(...data.map(c => c.low)) * 0.985;
        const maxP = Math.max(...data.map(c => c.high)) * 1.015;
        const range = Math.max(1e-9, maxP - minP);
        const candleW = width / visible;
        const bodyW = Math.max(2, candleW * 0.74);
        const getY = (p) => height - ((p - minP) / range) * (height - 20) - 10;

        data.forEach((c, i) => {
          const x = i * candleW;
          const up = c.close >= c.open;
          ctxMain.strokeStyle = up ? '#22c55e' : '#ef4444';
          ctxMain.fillStyle = up ? '#22c55e' : '#ef4444';
          ctxMain.lineWidth = 1.4;
          ctxMain.beginPath();
          ctxMain.moveTo(x + candleW / 2, getY(c.high));
          ctxMain.lineTo(x + candleW / 2, getY(c.low));
          ctxMain.stroke();
          const y1 = getY(c.open), y2 = getY(c.close);
          const rectY = Math.min(y1, y2);
          const rectH = Math.max(1, Math.abs(y2 - y1));
          ctxMain.fillRect(x + (candleW - bodyW) / 2, rectY, bodyW, rectH);
        });

        const lineMap = [
          { p: 5, color: '#3b82f6', dash: [] },
          { p: 15, color: '#eab308', dash: [] },
          { p: 100, color: '#a855f7', dash: [6, 6] },
        ];
        for (const item of lineMap) {
          ctxMain.strokeStyle = item.color;
          ctxMain.lineWidth = 2.2;
          ctxMain.setLineDash(item.dash);
          ctxMain.beginPath();
          let started = false;
          for (let i = 0; i < state.history.length; i++) {
            if (i < item.p - 1 || i < start) continue;
            const avg = sma(state.history.slice(0, i + 1), item.p);
            if (avg == null) continue;
            const x = (i - start) * candleW + candleW / 2;
            const y = getY(avg);
            if (!started) { ctxMain.moveTo(x, y); started = true; } else { ctxMain.lineTo(x, y); }
          }
          ctxMain.stroke();
          ctxMain.setLineDash([]);
        }

        const last = state.history[state.history.length - 1];
        const lastY = getY(last.close);
        ctxMain.strokeStyle = '#71717a';
        ctxMain.setLineDash([6, 6]);
        ctxMain.beginPath();
        ctxMain.moveTo(0, lastY);
        ctxMain.lineTo(width, lastY);
        ctxMain.stroke();
        ctxMain.setLineDash([]);
      }

      function drawPortfolioChart() {
        const rect = portfolioWrap.getBoundingClientRect();
        const width = rect.width;
        const height = rect.height;
        ctxPortfolio.clearRect(0, 0, width, height);
        if (!state.portfolio.length) return;
        ctxPortfolio.fillStyle = '#09090b';
        ctxPortfolio.fillRect(0, 0, width, height);
        const minV = Math.min(...state.portfolio) * 0.99;
        const maxV = Math.max(...state.portfolio) * 1.01;
        const range = Math.max(1e-9, maxV - minV);
        const visible = 100;
        const step = width / visible;
        const getY = (v) => height - ((v - minV) / range) * (height - 20) - 10;
        ctxPortfolio.beginPath();
        ctxPortfolio.strokeStyle = '#a855f7';
        ctxPortfolio.lineWidth = 2.2;
        state.portfolio.forEach((v, i) => {
          const x = (visible - state.portfolio.length + i) * step;
          const y = getY(v);
          if (i === 0) ctxPortfolio.moveTo(x, y);
          else ctxPortfolio.lineTo(x, y);
        });
        ctxPortfolio.stroke();
        ctxPortfolio.lineTo((visible - 1) * step, height);
        ctxPortfolio.lineTo((visible - state.portfolio.length) * step, height);
        ctxPortfolio.closePath();
        const g = ctxPortfolio.createLinearGradient(0, 0, 0, height);
        g.addColorStop(0, 'rgba(168,85,247,0.25)');
        g.addColorStop(1, 'rgba(168,85,247,0)');
        ctxPortfolio.fillStyle = g;
        ctxPortfolio.fill();
      }

      function drawProfitChart() {
        const width = profitChart.width / dpr;
        const height = profitChart.height / dpr;
        ctxProfit.clearRect(0, 0, width, height);
        ctxProfit.fillStyle = '#09090b';
        ctxProfit.fillRect(0, 0, width, height);

        const bots = botNames.map(k => ({
          key: k,
          label: botLabel[k],
          profit: state.botStats[k].profit,
          sharpe: state.botStats[k].sharpe,
          color: k === 'sma' ? '#3b82f6' : k === 'pattern' ? '#a855f7' : k === 'alpha3' ? '#22c55e' : '#f59e0b'
        }));
        const maxAbs = Math.max(1, ...bots.map(b => Math.abs(b.profit)));
        const barW = (width - 60) / bots.length - 12;
        const baseY = height - 34;
        ctxProfit.fillStyle = '#a1a1aa';
        ctxProfit.font = '11px ui-monospace, monospace';
        bots.forEach((b, i) => {
          const x = 16 + i * ((width - 40) / bots.length);
          const barH = (Math.abs(b.profit) / maxAbs) * (height - 70);
          const y = baseY - barH;
          ctxProfit.fillStyle = b.color;
          ctxProfit.fillRect(x, y, barW, barH);
          ctxProfit.fillStyle = '#e4e4e7';
          ctxProfit.fillText(b.label, x, height - 18);
          ctxProfit.fillStyle = '#a1a1aa';
          ctxProfit.fillText((b.profit >= 0 ? '+' : '') + fmt.format(b.profit), x, Math.max(12, y - 6));
        });
      }

      async function callAI(prompt, isJson = false) {
        const provider = (els.aiProvider?.value || state.aiProvider || "Gemini").trim();
        const apiKey = (els.aiApiKey?.value || "").trim();
        const model = (els.aiModel?.value || state.aiModel || "gemini-2.5-flash-preview-09-2025").trim();

        if (provider !== "Mock" && !apiKey) return null;

        const systemText = "You are a quantitative finance AI.";

        async function tryFetch(url, options, parser) {
          for (let i = 0; i < 3; i++) {
            try {
              const res = await fetch(url, options);
              const data = await res.json();
              const out = parser(data);
              if (out) return out;
            } catch (e) {
              await new Promise(r => setTimeout(r, Math.pow(2, i) * 500));
            }
          }
          return null;
        }

        if (provider === "Gemini") {
          const url = `https://generativelanguage.googleapis.com/v1beta/models/${encodeURIComponent(model || "gemini-2.5-flash-preview-09-2025")}:generateContent?key=${encodeURIComponent(apiKey)}`;
          const payload = {
            contents: [{ parts: [{ text: prompt }] }],
            systemInstruction: { parts: [{ text: systemText }] }
          };
          if (isJson) {
            payload.generationConfig = {
              responseMimeType: "application/json",
              responseSchema: {
                type: "OBJECT",
                properties: {
                  headline: { type: "STRING" },
                  impact: { type: "STRING" }
                }
              }
            };
          }
          return await tryFetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
          }, (data) => data?.candidates?.[0]?.content?.parts?.[0]?.text || null);
        }

        if (provider === "OpenAI") {
          const url = "https://api.openai.com/v1/chat/completions";
          const payload = {
            model: model || "gpt-4o-mini",
            messages: [
              { role: "system", content: systemText },
              { role: "user", content: prompt }
            ],
            temperature: 0.7
          };
          if (isJson) payload.response_format = { type: "json_object" };
          return await tryFetch(url, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "Authorization": `Bearer ${apiKey}`
            },
            body: JSON.stringify(payload)
          }, (data) => data?.choices?.[0]?.message?.content || null);
        }

        if (provider === "Anthropic") {
          const url = "https://api.anthropic.com/v1/messages";
          const payload = {
            model: model || "claude-3-5-sonnet-latest",
            max_tokens: 512,
            system: systemText,
            messages: [{ role: "user", content: prompt }]
          };
          return await tryFetch(url, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "x-api-key": apiKey,
              "anthropic-version": "2023-06-01"
            },
            body: JSON.stringify(payload)
          }, (data) => data?.content?.[0]?.text || null);
        }

        return null;
      }

  async function getAIAdvice() {
    state.isFetchingAdvice = true; updateSidebar();
    const p = currentPrice();
    const nw = netWorth();
    const prompt = `The user is playing a quantitative trading simulator. Net Worth: $${nw.toFixed(2)}, Cash: $${state.cash.toFixed(2)}, Holdings: ${state.holdings} shares. Current Market Price: $${p.toFixed(2)}. Market Regime: ${state.regime.name}. Give a fun, extremely brief 2-sentence piece of financial advice or roast their performance.`;
    const res = await callAI(prompt, false);
    const text = res || fallbackAdvice();
    state.aiAdvice = text;
    els.aiAdviceBox.textContent = text;
    els.aiAdviceBox.classList.remove("hidden");
    state.isFetchingAdvice = false; updateSidebar();
  }

  async function generateMarketNews() {
    state.isFetchingNews = true; updateSidebar();
    const prompt = `Generate a realistic, highly impactful breaking financial/macroeconomic news headline for a fictional market that would cause a sudden shock. Output a JSON object with 'headline' and 'impact' ('bull' or 'bear').`;
    let headline = null, impact = null;
    const res = await callAI(prompt, true);
    if (res) {
      try {
        const parsed = JSON.parse(res);
        headline = parsed.headline;
        impact = parsed.impact;
      } catch (e) {}
    }
    if (!headline) {
      const bull = Math.random() > 0.5;
      headline = bull ? "Central bank launches surprise liquidity flood after earnings shock." : "Global supply chain freeze triggers sudden risk-off panic across markets.";
      impact = bull ? "bull" : "bear";
    }
    state.newsHeadline = { text: headline, impact };
    setBanner(headline, impact);
    const isBull = impact === "bull";
    state.regime = { drift: isBull ? 0.005 : -0.005, vol: 0.020, name: `AI News Shock (${isBull ? 'Bull' : 'Bear'})` };
    state.history[state.history.length - 1].close = Math.max(state.history[state.history.length - 1].close * (isBull ? 1.05 : 0.95), 0.01);
    renderAll();
    state.isFetchingNews = false; updateSidebar();
  }

  async function getStrategyAnalysis() {
    state.isFetchingAnalyst = true; updateSidebar();
    const closes = state.history.map(h => h.close);
    const price = closes[closes.length - 1];
    const rsi14 = rsi(closes, 14);
    const prompt = `You are an expert quantitative trading AI assistant. The current asset price is $${price.toFixed(2)}. The RSI(14) is ${rsi14.toFixed(2)}. The current P/E ratio is ${state.peRatio.toFixed(2)}. Give a 2-sentence technical analysis on whether the algorithms should be buying or selling right now and why. Be direct and analytical.`;
    const res = await callAI(prompt, false);
    const text = res || `Technical view: price ${formatCurrency(price)}, RSI ${rsi14.toFixed(2)}, P/E ${state.peRatio.toFixed(2)}. The bots are not getting a free pass.`;
    state.analystReport = text;
    els.analysisBox.textContent = text;
    els.analysisBox.classList.remove("hidden");
    state.isFetchingAnalyst = false; updateSidebar();
  }

  function toggleRunning() {
    state.isRunning = !state.isRunning;
    els.toggleRun.textContent = state.isRunning ? 'HALT' : 'START';
    els.toggleRun.className = `btn rounded-lg p-2 font-semibold border ${state.isRunning ? 'bg-red-500/15 text-red-300 border-red-500/20' : 'bg-emerald-500/15 text-emerald-300 border-emerald-500/20'}`;
    if (state.isRunning) {
      state.timer = setInterval(() => {
        tick();
      }, 500 / state.speed);
    } else {
      clearInterval(state.timer);
      state.timer = null;
    }
  }

  function changeSpeed() {
    state.speed = state.speed === 1 ? 5 : state.speed === 5 ? 20 : 1;
    els.toggleSpeed.textContent = state.speed + 'x';
    if (state.isRunning) {
      clearInterval(state.timer);
      state.timer = setInterval(() => tick(), 500 / state.speed);
    }
  }

  function updateSidebar() {
    const price = currentPrice();
    const nw = netWorth();
    els.netWorth.textContent = formatCurrency(nw);
    els.cash.textContent = formatCurrency(state.cash);
    els.holdings.textContent = state.holdings;
    els.peRatio.textContent = state.peRatio.toFixed(2);
    els.sharpeRatio.textContent = sharpe(state.portfolio).toFixed(2);
    els.maxDrawdown.textContent = ((nw - state.maxNetWorth) / state.maxNetWorth * 100).toFixed(2) + '%';
    els.regimeName.textContent = state.regime.name;
    els.priceLabel.firstChild.nodeValue = formatCurrency(price) + ' ';
    els.trendIcon.textContent = state.displayPrice >= state.lastDrawnPrice ? '▲' : '▼';
    els.trendIcon.className = state.displayPrice >= state.lastDrawnPrice ? 'text-green-400' : 'text-red-400';
    els.tickerText.textContent = `SMA Sharpe: ${state.botArena.sma.sharpe.toFixed(2)} | Pattern Sharpe: ${state.botArena.pattern.sharpe.toFixed(2)} | Alpha3 Sharpe: ${state.botArena.alpha3.sharpe.toFixed(2)} | Custom Sharpe: ${state.botArena.custom.sharpe.toFixed(2)}`;
    els.botArenaLegend.innerHTML = `
      <div>SMA: ${fmt.format(state.botArena.sma.profit)}</div>
      <div>Pattern: ${fmt.format(state.botArena.pattern.profit)}</div>
      <div>Alpha3: ${fmt.format(state.botArena.alpha3.profit)}</div>
      <div>Custom: ${fmt.format(state.botArena.custom.profit)}</div>
    `;
    setTradeButtons();
    renderTrades();
    drawAll();
  }

  function tick() {
    const last = state.history[state.history.length - 1];
    const p = last.close;
    const change = p * (state.regime.drift + state.regime.vol * randn());
    const newPrice = Math.max(0.01, p + change);
    state.displayPrice = newPrice;
    state.history[state.history.length - 1].close = newPrice;
    state.history[state.history.length - 1].high = Math.max(state.history[state.history.length - 1].high, newPrice);
    state.history[state.history.length - 1].low = Math.min(state.history[state.history.length - 1].low, newPrice);
    state.portfolio[state.portfolio.length - 1] = state.cash + state.holdings * newPrice;
    state.maxNetWorth = Math.max(state.maxNetWorth, state.portfolio[state.portfolio.length - 1]);
    computeBotSnapshots(newPrice);
    updateSidebar();
  }

  function drawAll() {
    drawMainChart();
    drawPortfolioChart();
    drawProfitChart();
  }

  updateSidebar();
  resizeCanvases();
})();
  </script>
</body>
</html>
